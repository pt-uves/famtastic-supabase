# ==============================================================================
# Supabase Project Configuration
# This file IS version-controlled. Do NOT commit secrets here.
# Use environment variables via env() for anything sensitive.
# ==============================================================================

# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "famtastic"

[api]
enabled = true
# Port to use for the local API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this
# schema will get API endpoints. `public` and `graphql_public` schemas are
# always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure.
# Limits payload size for accidental or malicious requests.
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialise the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Run `SHOW server_version;` on the remote database to check.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

[db.seed]
# Seeding runs after migrations on `supabase db reset`. Migrations own all schema
# and system reference data (e.g. system task_categories). Local dev *data* (auth
# users, families, children, ...) lives in a gitignored snapshot generated by
# `npm run db:snapshot`. The glob matches nothing on a fresh clone, so reset then
# just produces an empty-but-valid DB.
enabled = true
sql_paths = ["./seeds/*.local.sql"]

[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6. (default: IPv6)
# ip_version = "IPv6"
# The minimum token length in bytes used to verify auth tokens. (default: 16)
# max_header_length = 4096

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server. Emails sent in development are saved here.
[local_smtp]
enabled = true
port = 54324
# smtp_port = 54325
# pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for
# constructing URLs used in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post
# authentication. Wildcards are NOT allowed for security reasons.
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "http://127.0.0.1:3000",
  "https://127.0.0.1:3000",
  # Mobile deep-link callback (fill in real scheme when app is configured)
  "famtastic://auth/callback",
  "exp://127.0.0.1:19000/--/auth/callback"
]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous sign-ins to your project.
enable_anonymous_sign_ins = false
# Allow/disallow testing manual linking of accounts.
enable_manual_linking = false

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the
# old and new email addresses. If disabled, only the new email is required to
# be confirmed.
double_confirm_changes = true
# OTP email verification is REQUIRED before the user can sign in.
enable_confirmations = true
# Minimum time before another email may be sent to the SAME address.
# 10s for local dev so OTP resends aren't blocked; raise for production.
max_frequency = "10s"
# Supabase will send a 6-digit OTP code (not a magic link) for signup confirmation.
  otp_expiry = 600
  otp_length = 6

# ──────────────────────────────────────────────────────────────────────────────
# Auth rate limits. `email_sent` is per hour, across the WHOLE project (every
# address combined). The CLI default is 2/hour - fine as a production abuse guard,
# far too low for development, and the cause of "over_email_send_rate_limit".
# Raising it above 2 REQUIRES [auth.email.smtp] to be enabled (it is, below).
# Tune these down before shipping to production.
# ──────────────────────────────────────────────────────────────────────────────
[auth.rate_limit]
# Auth emails (OTP, signup confirmation, recovery, magic link) per hour, project-wide.
email_sent = 100

# ──────────────────────────────────────────────────────────────────────────────
# Outbound SMTP for LOCAL development - Resend (https://resend.com).
# With this enabled, the local stack sends REAL emails via Resend instead of
# capturing them in the Inbucket test server ([local_smtp] above).
#
# No 2FA required - just an API key. Sign up (free tier), create a key at
# https://resend.com/api-keys, and put it in .env as SMTP_PASS (the value looks
# like re_xxxxxxxx). Never commit it.
#
# The SMTP username is always the literal string "resend"; the API key is the
# password. `admin_email` is the From address and MUST be on a domain you've
# verified in Resend - for local testing use onboarding@resend.dev, which Resend
# lets you send from without verifying a domain.
#
# Port 465 = implicit SSL/TLS. If your network blocks it, use 587 (STARTTLS);
# Resend also accepts 2465 / 2587.
# ──────────────────────────────────────────────────────────────────────────────
[auth.email.smtp]
enabled = true
# Everything here is sourced from .env so this block is provider-agnostic and
# shared with the edge-function mailer (functions/_shared/email.ts). Switching
# from Resend to Amazon SES = edit .env only (port below if it changes).
host = "env(SMTP_HOST)"
port = 465
user = "env(SMTP_USER)"
# DO NOT commit the API key - keep it in .env, referenced here via env().
pass = "env(SMTP_PASS)"
admin_email = "env(SMTP_ADMIN_EMAIL)"
sender_name = "env(SMTP_SENDER_NAME)"

# ──────────────────────────────────────────────────────────────────────────────
# Branded Famtastic email templates.
# Paths are relative to the project root (where the `supabase` CLI runs), so they
# resolve to supabase/supabase/templates/*.html.
# NOTE: these apply to the LOCAL stack only. For the hosted project, paste the
# same HTML into Dashboard → Authentication → Email Templates (or set them via the
# Management API). See supabase/templates/README.md.
# ──────────────────────────────────────────────────────────────────────────────

# Confirm signup - sends the 6-digit OTP ({{ .Token }}).
[auth.email.template.confirmation]
subject = "Your Famtastic verification code"
content_path = "./supabase/templates/confirmation.html"

# Invite a member to a child ({{ .Data.inviter_name }}, {{ .Data.child_names }},
# {{ .Data.role_label }}, {{ .ConfirmationURL }}). Sent by the invite-member fn.
[auth.email.template.invite]
subject = "You've been invited to Famtastic"
content_path = "./supabase/templates/invite.html"

# Reset password - {{ .Token }} OTP code (no link; app-entered).
[auth.email.template.recovery]
subject = "Reset your Famtastic password"
content_path = "./supabase/templates/recovery.html"

# Passwordless sign-in - {{ .Token }} OTP code (no link; app-entered).
[auth.email.template.magic_link]
subject = "Your Famtastic sign-in code"
content_path = "./supabase/templates/magic_link.html"

# Change email address - {{ .Email }} → {{ .NewEmail }}, {{ .Token }} OTP code (no link).
[auth.email.template.email_change]
subject = "Confirm your new Famtastic email"
content_path = "./supabase/templates/email_change.html"

# Reauthentication (sensitive actions) - {{ .Token }} code.
[auth.email.template.reauthentication]
subject = "Your Famtastic confirmation code"
content_path = "./supabase/templates/reauthentication.html"

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "{{ .Code }} is your Famtastic verification code. It expires in 10 minutes."

[auth.mfa]
max_enrolled_factors = 10

# Configure one of the supported SMS providers: `twilio`, `twilio_verify`,
# `messagebird`, `textlocal`, `vonage`.
[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
# DO NOT commit your Twilio auth token to git.
# Instead, keep it in a .env file, referenced here via env().
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.sessions]
# Force log out after the specified duration.
# timebox = "8h"
# Force log out if the user has been inactive longer than the specified duration.
# inactivity_timeout = "8h"

# Use an external OAuth provider. The full list of providers are:
# `apple`, `azure`, `bitbucket`, `discord`, `facebook`, `github`, `gitlab`,
# `google`, `keycloak`, `linkedin_oidc`, `notion`, `twitch`, `twitter`,
# `slack`, `spotify`, `workos`, `zoom`.
# ─────────────────────────────────────────────────────────────────────────────
# Apple Sign-In
# Credentials: Apple Developer Portal → Certificates, Identifiers & Profiles
#   client_id  = Services ID (e.g. com.propelius.famtastic.auth)
#   secret     = Signed JWT built from: team_id + key_id + .p8 private key
#                Use env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)
# ─────────────────────────────────────────────────────────────────────────────
[auth.external.apple]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_ID)"
# DO NOT commit your OAuth provider secret to git!
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
# Redirect back to the app after Apple sign-in
redirect_uri = "famtastic://auth/callback"

# ─────────────────────────────────────────────────────────────────────────────
# Google OAuth 2.0
# Credentials: console.cloud.google.com → APIs & Services → OAuth 2.0 Client IDs
#   Authorised redirect URI must include:
#     https://<project-ref>.supabase.co/auth/v1/callback
# ─────────────────────────────────────────────────────────────────────────────
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
skip_nonce_check = true

[analytics]
enabled = false
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"
